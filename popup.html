<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Timer</title>
  <link rel="stylesheet" href="popup.css">
  <!-- Local Chart.js for store compliance -->
  <script src="chart.js"></script>
</head>
<body>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="stopwatch">Problems</button>
      <button class="tab-btn" data-tab="standalone-sw">Stopwatch</button>
      <button class="tab-btn" data-tab="timer">Timer</button>
      <button class="tab-btn" data-tab="log">History</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
    </div>

    <!-- Problems (Multi-Stopwatch) Section -->
    <div id="stopwatch" class="tab-content active">
      <div class="input-row">
        <input type="text" id="new-problem-name" placeholder="Problem ID/Name">
        <button id="add-problem">Add</button>
      </div>
      <div id="problems-container" style="max-height: 250px; overflow-y: auto; margin-top: 10px;">
        <!-- Individual problem timers will appear here -->
      </div>
    </div>

    <!-- Standalone Stopwatch Section -->
    <div id="standalone-sw" class="tab-content">
      <div class="display" id="sw-display">00:00:00.00</div>
      <div class="controls">
        <button id="sw-start">Start</button>
        <button id="sw-pause">Pause</button>
        <button id="sw-reset">Reset</button>
      </div>
    </div>

    <!-- Timer (Countdown) Section -->
    <div id="timer" class="tab-content">
      <div class="display" id="timer-display">00:00:00</div>
      <div class="input-row">
        <input type="number" id="timer-input" placeholder="Minutes" min="1">
        <button id="timer-start">Start</button>
      </div>
      <div class="presets">
        <button class="preset" data-time="5">5m</button>
        <button class="preset" data-time="10">10m</button>
        <button class="preset" data-time="25">25m</button>
      </div>
      <div class="controls">
        <button id="timer-pause">Pause</button>
        <button id="timer-reset">Reset</button>
      </div>
    </div>

    <!-- History Section -->
    <div id="log" class="tab-content">
      <div id="log-list" style="max-height: 250px; overflow-y: auto; margin-top: 10px; font-size: 0.9em; border: 1px solid #00ff00; padding: 5px;">
        <!-- History logs will appear here -->
      </div>
      <div class="controls" style="margin-top: 15px;">
        <button id="clear-log">Clear History</button>
      </div>
    </div>

    <!-- Statistics Section -->
    <div id="stats" class="tab-content">
      <div class="stats-summary">
        <div class="stat-card">
          <div class="stat-value" id="total-problems">0</div>
          <div class="stat-label">Problems</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-time-spent">0s</div>
          <div class="stat-label">Total Time</div>
        </div>
      </div>
      
      <div class="chart-section">
        <div class="chart-label">7-Day Progress (Mins)</div>
        <div class="chart-container">
          <canvas id="progressChart"></canvas>
        </div>
      </div>

      <div class="chart-section" id="active-chart-section" style="display: none; margin-top: 15px;">
        <div class="chart-label">Active Problems (Mins)</div>
        <div class="chart-container">
          <canvas id="activeProblemsChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
