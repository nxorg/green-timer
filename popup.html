<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Timer</title>
  <link rel="stylesheet" href="popup.css">
  <script src="chart.js"></script>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="stopwatch">Problems</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
      <button class="tab-btn" data-tab="log">History</button>
      <button class="tab-btn" data-tab="standalone-sw">Stopwatch</button>
      <button class="tab-btn" data-tab="timer">Timer</button>
    </div>

    <!-- 1. Problems Section -->
    <div id="stopwatch" class="tab-content active">
      <div class="input-row">
        <input type="text" id="new-problem-name" placeholder="Problem ID/Name">
        <select id="diff-select" style="width: auto; font-size: 0.8em; padding: 5px;">
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
        <button id="add-problem">Add</button>
      </div>
      <div id="problems-container" style="max-height: 250px; overflow-y: auto; margin-top: 10px;">
        <!-- Timers appear here -->
      </div>
    </div>

    <!-- 2. Statistics Section -->
    <div id="stats" class="tab-content">
      <div class="stats-summary">
        <div class="stat-card">
          <div class="stat-value" id="total-problems">0</div>
          <div class="stat-label">Problems</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="current-streak">0</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-time-spent">0s</div>
          <div class="stat-label">Total Time</div>
        </div>
      </div>
      <div class="chart-section"><div class="chart-label">7-Day Progress (Mins)</div><div class="chart-container"><canvas id="progressChart"></canvas></div></div>
      <div class="chart-section" id="active-chart-section" style="display: none; margin-top: 10px;"><div class="chart-label">Active (Mins)</div><div class="chart-container"><canvas id="activeProblemsChart"></canvas></div></div>
      <div class="chart-section" style="margin-top: 10px;"><div class="chart-label">Difficulty Distribution</div><div class="chart-container"><canvas id="diffChart"></canvas></div></div>
      <div class="chart-section" style="margin-top: 10px;"><div class="chart-label">Hourly Activity</div><div class="chart-container"><canvas id="hourlyActivityChart"></canvas></div></div>
    </div>

    <!-- 3. History Section -->
    <div id="log" class="tab-content">
      <div id="log-list" style="max-height: 250px; overflow-y: auto; margin-top: 10px; font-size: 0.9em; border: 1px solid #00ff0033; padding: 5px;">
        <!-- Logs appear here -->
      </div>
      <div class="controls" style="margin-top: 15px;">
        <button id="export-csv">Export CSV</button>
        <button id="clear-log">Clear All</button>
      </div>
    </div>

    <!-- 4. Standalone Stopwatch Section -->
    <div id="standalone-sw" class="tab-content">
      <div class="display" id="sw-display">00:00:00.00</div>
      <div class="controls">
        <button id="sw-start">Start</button>
        <button id="sw-pause">Pause</button>
        <button id="sw-reset">Reset</button>
      </div>
    </div>

    <!-- 5. Timer (Countdown) Section -->
    <div id="timer" class="tab-content">
      <div class="display" id="timer-display">00:00:00</div>
      <div class="input-row"><input type="number" id="timer-input" placeholder="Minutes" min="1"><button id="timer-start">Start</button></div>
      <div class="presets"><button class="preset" data-time="5">5m</button><button class="preset" data-time="10">10m</button><button class="preset" data-time="25">25m</button></div>
      <div class="controls"><button id="timer-pause">Pause</button><button id="timer-reset">Reset</button></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
