<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Green Timer</title>
  <style>
    :root {
      --green: #00ff00;
      --bg-dark: #0a0a0a;
      --text-color: #ffffff;
    }
    body {
      background: var(--bg-dark);
      color: var(--text-color);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
      border: 1px solid #333;
      background: rgba(255, 255, 255, 0.02);
    }
    h1 { color: var(--green); letter-spacing: 2px; }
    p { line-height: 1.6; opacity: 0.8; }
    .pin-box {
      margin-top: 30px;
      padding: 20px;
      border: 2px dashed var(--green);
      background: rgba(0, 255, 0, 0.05);
    }
    .arrow { font-size: 2em; color: var(--green); margin-bottom: 10px; }
    .step { font-weight: bold; margin: 10px 0; }
    kbd {
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    button {
      margin-top: 30px;
      background: var(--green);
      color: black;
      border: none;
      padding: 12px 30px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>WELCOME TO GREEN TIMER</h1>
    <p>Engineering Innovation for Everyone.</p>
    
    <div class="pin-box">
      <div class="arrow">↑</div>
      <div class="step">PLEASE PIN THE EXTENSION FOR QUICK ACCESS</div>
      <p>1. Click the 🧩 (Extensions) icon in your toolbar.<br>
         2. Find <strong>Green Timer</strong>.<br>
         3. Click the 📌 (Pin) icon.</p>
    </div>

    <button id="get-started">GET STARTED</button>
  </div>
  <script src="welcome.js"></script>
</body>
</html>
